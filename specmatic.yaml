version: 3

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            filesystem:
              directory: specs/openapi
          specs:
            - spec:
                id: taskApiSpec
                path: task-api.yaml
      - definition:
          source:
            filesystem:
              directory: specs/asyncapi
          specs:
            - task-events.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: http://task-service:8080
        specs:
          - spec:
              id: taskApiSpec
              securitySchemes:
                basicAuth:
                  type: basicAuth
                  token: ${TASK_BASIC_AUTH_TOKEN:Y2hhcmxpZTpwYXNzd29yZDQ1Ng==}
                bearerAuth:
                  type: bearer
                  token: ${TASK_BEARER_TOKEN:tok_charlie_admin_8a4f}
                apiKeyAuth:
                  type: apiKey
                  token: ${TASK_API_KEY:key_charlie_admin_7788}
      asyncapi:
        type: test
        subscriberReadinessWaitTime: 5000
        servers:
          - host: kafka:9092
            protocol: kafka
    data:
      examples:
        - directories:
            - specs/asyncapi/examples

specmatic:
  settings:
    test:
      schemaResiliencyTests: all
  governance:
    report:
      formats:
        - html
      outputDirectory: build/reports/specmatic
    successCriteria:
      # 401/403 are declared on every secured operation for documentation purposes, but a
      # contract-test run only ever exercises one configured (working) credential per scheme, so
      # those codes can never be triggered and always show up as "not tested" in the coverage
      # report. Measured coverage with all 401/403 declared and all 135+2 tests passing: 58%.
      minCoveragePercentage: 58
      maxMissedOperationsInSpec: 0
      enforce: true
  license:
    path: /specmatic/specmatic-license.txt
