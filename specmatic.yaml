version: 3

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            filesystem:
              directory: specs/openapi
          specs:
            - spec:
                id: taskApiSpec
                path: task-api.yaml
      - definition:
          source:
            filesystem:
              directory: specs/asyncapi
          specs:
            - task-events.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: http://task-service:8080
        specs:
          - spec:
              id: taskApiSpec
              securitySchemes:
                basicAuth:
                  type: basicAuth
                  token: ${TASK_BASIC_AUTH_TOKEN:Y2hhcmxpZTpwYXNzd29yZDQ1Ng==}
                bearerAuth:
                  type: bearer
                  token: ${TASK_BEARER_TOKEN:tok_charlie_admin_8a4f}
                apiKeyAuth:
                  type: apiKey
                  token: ${TASK_API_KEY:key_charlie_admin_7788}
      asyncapi:
        type: test
        subscriberReadinessWaitTime: 5000
        servers:
          - host: kafka:9092
            protocol: kafka
    data:
      examples:
        - directories:
            - specs/asyncapi/examples
            - specs/openapi/examples/task-api

specmatic:
  settings:
    test:
      schemaResiliencyTests: all
  governance:
    report:
      formats:
        - html
      outputDirectory: build/reports/specmatic
    successCriteria:
      # 401/403 are declared on every secured operation and actually exercised: dedicated external
      # examples in specs/openapi/examples/task-api/ carry their own hardcoded (invalid or
      # wrong-role) credentials per scenario, independent of the working credential configured
      # below for the positive-path examples. That's what makes them "tested" instead of
      # permanently "not tested" in the coverage report. Measured: 143+2 tests passing, 100%.
      minCoveragePercentage: 100
      maxMissedOperationsInSpec: 0
      enforce: true
  license:
    path: /specmatic/specmatic-license.txt
