name: Contract Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write Specmatic license
        run: echo "${{ secrets.SPECMATIC_LICENSE }}" > ./license.txt

      - name: Start Kafka and task-service
        run: docker compose up -d --build kafka kafka-init task-service

      - name: Wait for kafka-init and task-service to be ready
        run: |
          docker compose wait kafka-init
          timeout 120 bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" taskflow-task-service)" = "healthy" ]; do sleep 2; done'

      - name: Run Task API contract tests
        run: |
          docker compose up --build \
            --exit-code-from test-task-api \
            --abort-on-container-exit \
            test-task-api

      - name: Tear down Task API stack
        if: always()
        run: docker compose down --volumes

      - name: Start user-service
        run: docker compose up -d --build user-service

      - name: Wait for user-service to be ready
        run: |
          timeout 60 bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" taskflow-user-service)" = "healthy" ]; do sleep 2; done'

      - name: Run User API contract tests
        run: |
          docker compose up --build \
            --exit-code-from test-user-api \
            --abort-on-container-exit \
            test-user-api

      - name: Tear down User API stack
        if: always()
        run: docker compose down --volumes

      - name: Upload Specmatic test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-reports
          path: build/reports/specmatic/
