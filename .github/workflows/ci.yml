name: Contract Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write Specmatic license
        run: echo "${{ secrets.SPECMATIC_LICENSE }}" > ./license.txt

      - name: Start Kafka and task-service
        run: docker compose up -d --build kafka kafka-init task-service

      - name: Wait for task-service to be ready
        run: |
          timeout 120 bash -c 'until docker ps --filter "name=taskflow-task-service" --filter "health=healthy" --format "{{.Names}}" | grep -q taskflow-task-service; do sleep 2; done'

      - name: "Run Task API contract tests (incl. schema resiliency: all)"
        run: docker compose run --no-deps --rm test-task-api

      - name: Tear down Task API stack
        if: always()
        run: docker compose down --volumes

      - name: Start user-service
        run: docker compose up -d --build user-service

      - name: Wait for user-service to be ready
        run: |
          timeout 60 bash -c 'until docker ps --filter "name=taskflow-user-service" --filter "health=healthy" --format "{{.Names}}" | grep -q taskflow-user-service; do sleep 2; done'

      - name: "Run User API contract tests (incl. schema resiliency: all)"
        run: docker compose run --no-deps --rm test-user-api

      - name: Tear down User API stack
        if: always()
        run: docker compose down --volumes

      - name: Upload Specmatic test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-reports
          path: build/reports/specmatic/
