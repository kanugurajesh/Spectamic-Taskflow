version: 3

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            filesystem:
              directory: specs/openapi
          specs:
            - spec:
                id: userApiSpec
                path: user-api.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: http://user-service:8081
        specs:
          - spec:
              id: userApiSpec
              securitySchemes:
                apiKeyAuth:
                  type: apiKey
                  token: ${USER_API_KEY:key_charlie_admin_7788}
    data:
      examples:
        - directories:
            - specs/openapi/examples/user-api

specmatic:
  settings:
    test:
      schemaResiliencyTests: all
  governance:
    report:
      formats:
        - html
      outputDirectory: build/reports/specmatic
    successCriteria:
      minCoveragePercentage: 100
      maxMissedOperationsInSpec: 0
      enforce: true
  license:
    path: /specmatic/specmatic-license.txt
