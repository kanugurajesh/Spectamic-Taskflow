version: 3

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            filesystem:
              directory: specs/openapi
          specs:
            - spec:
                id: userApiSpec
                path: user-api.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: http://user-service:8081
        specs:
          - spec:
              id: userApiSpec
              securitySchemes:
                apiKeyAuth:
                  type: apiKey
                  token: ${USER_API_KEY:key_charlie_admin_7788}

specmatic:
  settings:
    test:
      schemaResiliencyTests: all
  governance:
    report:
      formats:
        - html
      outputDirectory: build/reports/specmatic
    successCriteria:
      # 401/403 are declared on every secured operation for documentation purposes, but a
      # contract-test run only ever exercises one configured (working) credential per scheme, so
      # those codes can never be triggered and always show up as "not tested" in the coverage
      # report. Measured coverage with all 401/403 declared and all 49 tests passing: 56%.
      minCoveragePercentage: 56
      maxMissedOperationsInSpec: 0
      enforce: true
  license:
    path: /specmatic/specmatic-license.txt
