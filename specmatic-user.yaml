version: 3

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            filesystem:
              directory: specs/openapi
          specs:
            - spec:
                id: userApiSpec
                path: user-api.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: http://user-service:8081
        specs:
          - spec:
              id: userApiSpec
              securitySchemes:
                apiKeyAuth:
                  type: apiKey
                  token: ${USER_API_KEY:key_charlie_admin_7788}
    data:
      examples:
        - directories:
            - specs/openapi/examples/user-api

specmatic:
  settings:
    test:
      schemaResiliencyTests: all
  governance:
    report:
      formats:
        - html
      outputDirectory: build/reports/specmatic
    successCriteria:
      # 401/403 are declared on every secured operation and actually exercised: dedicated external
      # examples in specs/openapi/examples/user-api/ carry their own hardcoded (invalid or
      # wrong-role) credentials per scenario, independent of the working credential configured
      # below for the positive-path examples. That's what makes them "tested" instead of
      # permanently "not tested" in the coverage report. Measured: 53 tests passing, 100%.
      minCoveragePercentage: 100
      maxMissedOperationsInSpec: 0
      enforce: true
  license:
    path: /specmatic/specmatic-license.txt
