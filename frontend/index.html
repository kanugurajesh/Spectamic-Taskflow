<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Contract-Driven Task Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar: '#0C0E11',
            accent: '#E85D2F',
            surface: '#F5F3EE',
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    *, body { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3, .font-display { font-family: 'Syne', sans-serif; }
    .font-mono-custom { font-family: 'DM Mono', monospace; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C5C0B8; border-radius: 2px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 8px;
      color: #6B7280; font-size: 13px; font-weight: 500;
      transition: all 0.15s; cursor: pointer;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: #E5E5E5; }
    .nav-item.active { background: rgba(232,93,47,0.15); color: #E85D2F; }

    .task-card {
      background: #FAFAF8; border: 1px solid #E8E4DC;
      border-radius: 10px; padding: 14px; cursor: pointer;
      transition: all 0.15s;
    }
    .task-card:hover {
      border-color: #C5C0B8;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }

    .slide-panel {
      position: fixed; top: 0; right: 0;
      height: 100vh; width: 420px;
      background: #FAFAF8; z-index: 50;
      box-shadow: -8px 0 40px rgba(0,0,0,0.12);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .slide-panel.open { transform: translateX(0); }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(2px);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1A1A1A; color: white;
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      z-index: 100; transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #DC2626; }

    .skeleton {
      background: linear-gradient(90deg, #ECEAE4 25%, #E2DED7 50%, #ECEAE4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 10px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) both; }

    .api-opt { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 7px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .api-opt.selected { background: rgba(232,93,47,0.12); border-color: rgba(232,93,47,0.25); }

    input, textarea, select { font-family: 'DM Sans', sans-serif; }
    input:focus, textarea:focus, select:focus { border-color: #E85D2F !important; outline: none; }

    .col-dot-pending { background: #94A3B8; }
    .col-dot-inprogress { background: #F59E0B; }
    .col-dot-completed { background: #22C55E; }

    .col-label-pending { color: #64748B; }
    .col-label-inprogress { color: #B45309; }
    .col-label-completed { color: #15803D; }

    .pill-pending { background: #F0EFE9; }
    .pill-inprogress { background: #FEF9EE; }
    .pill-completed { background: #F0FDF4; }
  </style>
</head>
<body class="h-screen flex overflow-hidden bg-surface">

  <!-- SIDEBAR -->
  <aside style="width:220px; background:#0C0E11; flex-shrink:0; display:flex; flex-direction:column; padding:20px 12px; min-height:100vh;">
    <!-- Logo -->
    <div style="padding:4px 4px 24px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
        <div style="width:30px;height:30px;border-radius:9px;background:#E85D2F;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="15" height="15" viewBox="0 0 14 14" fill="none">
            <rect x="1" y="1" width="5" height="5" rx="1.2" fill="white"/>
            <rect x="8" y="1" width="5" height="5" rx="1.2" fill="white" opacity="0.55"/>
            <rect x="1" y="8" width="5" height="5" rx="1.2" fill="white" opacity="0.55"/>
            <rect x="8" y="8" width="5" height="5" rx="1.2" fill="white"/>
          </svg>
        </div>
        <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#F5F5F5;letter-spacing:-0.4px;">TaskFlow</span>
      </div>
      <p style="font-family:'DM Mono',monospace;font-size:9px;color:#3B4049;letter-spacing:0.1em;text-transform:uppercase;padding-left:40px;">contract-driven</p>
    </div>

    <!-- Nav -->
    <div style="display:flex;flex-direction:column;gap:2px;margin-bottom:auto;">
      <div class="nav-item active">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="9" y="9" width="5.5" height="5.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Board
      </div>
      <div class="nav-item" onclick="checkHealth()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M1 8h3l2-5 3 10 2-5h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Health
      </div>
      <div class="nav-item" onclick="alert('Open Specmatic Studio:\ndocker compose --profile studio up studio\n\nThen visit: http://localhost:9000')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M13 9.5V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M9 2h5v5M14 2l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Studio
      </div>
    </div>

    <!-- API Switcher -->
    <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;margin-top:16px;">
      <p style="font-family:'DM Mono',monospace;font-size:9px;color:#3B4049;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;padding:0 4px;">API Target</p>
      <div id="opt-mock" class="api-opt selected" onclick="setApi('http://localhost:9100','opt-mock')">
        <div id="dot-mock" style="width:7px;height:7px;border-radius:50%;background:#E85D2F;flex-shrink:0;"></div>
        <div>
          <div style="font-size:12px;color:#E5E5E5;font-weight:500;">Mock Server</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:#6B7280;">:9100</div>
        </div>
      </div>
      <div id="opt-real" class="api-opt" onclick="setApi('http://localhost:8080','opt-real')" style="margin-top:4px;">
        <div id="dot-real" style="width:7px;height:7px;border-radius:50%;background:#374151;flex-shrink:0;"></div>
        <div>
          <div style="font-size:12px;color:#6B7280;font-weight:500;">Real Service</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:#4B5563;">:8080</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:#F5F3EE;">

    <!-- Header -->
    <header style="height:56px;border-bottom:1px solid #E8E4DC;background:#F5F3EE;padding:0 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:10px;">
        <h1 style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#1A1A1A;letter-spacing:-0.3px;">Task Board</h1>
        <span id="totalPill" style="font-family:'DM Mono',monospace;font-size:11px;color:#9CA3AF;background:#ECEAE4;padding:2px 8px;border-radius:10px;">0 tasks</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button onclick="loadTasks()" style="padding:7px 13px;border-radius:8px;border:1px solid #E8E4DC;background:white;font-size:13px;font-weight:500;color:#6B7280;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color 0.15s;" onmouseover="this.style.borderColor='#C5C0B8'" onmouseout="this.style.borderColor='#E8E4DC'">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10 6A4 4 0 1 1 6 2M6 1l2 1.5L6 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Refresh
        </button>
        <button onclick="openCreate()" style="padding:7px 15px;border-radius:8px;border:none;background:#E85D2F;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:white;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.15s;" onmouseover="this.style.background='#CF4E22'" onmouseout="this.style.background='#E85D2F'">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
          New Task
        </button>
      </div>
    </header>

    <!-- Kanban -->
    <div style="flex:1;overflow-x:auto;overflow-y:hidden;">
      <div style="display:flex;gap:20px;padding:24px;height:100%;min-width:980px;box-sizing:border-box;">

        <!-- PENDING -->
        <div style="flex:0 0 300px;display:flex;flex-direction:column;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
            <div style="width:8px;height:8px;border-radius:50%;" class="col-dot-pending"></div>
            <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.09em;" class="col-label-pending">Pending</span>
            <span id="cnt-pending" style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 7px;border-radius:10px;border:1px solid rgba(0,0,0,0.07);" class="pill-pending">0</span>
          </div>
          <div id="col-pending" style="display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;padding-bottom:16px;"></div>
        </div>

        <!-- IN PROGRESS -->
        <div style="flex:0 0 300px;display:flex;flex-direction:column;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
            <div style="width:8px;height:8px;border-radius:50%;" class="col-dot-inprogress"></div>
            <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.09em;" class="col-label-inprogress">In Progress</span>
            <span id="cnt-in-progress" style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 7px;border-radius:10px;border:1px solid rgba(0,0,0,0.07);" class="pill-inprogress">0</span>
          </div>
          <div id="col-in-progress" style="display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;padding-bottom:16px;"></div>
        </div>

        <!-- COMPLETED -->
        <div style="flex:0 0 300px;display:flex;flex-direction:column;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
            <div style="width:8px;height:8px;border-radius:50%;" class="col-dot-completed"></div>
            <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.09em;" class="col-label-completed">Completed</span>
            <span id="cnt-completed" style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 7px;border-radius:10px;border:1px solid rgba(0,0,0,0.07);" class="pill-completed">0</span>
          </div>
          <div id="col-completed" style="display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;padding-bottom:16px;"></div>
        </div>

      </div>
    </div>
  </main>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay" onclick="closePanel()"></div>

  <!-- CREATE PANEL -->
  <div id="createPanel" class="slide-panel">
    <div style="padding:22px 24px;border-bottom:1px solid #E8E4DC;background:#F5F3EE;flex-shrink:0;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h2 style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#1A1A1A;">New Task</h2>
        <button onclick="closePanel()" style="width:28px;height:28px;border-radius:7px;border:1px solid #E8E4DC;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;" onmouseover="this.style.background='#F0EFE9'" onmouseout="this.style.background='white'">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 1l9 9M10 1L1 10" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <form id="createForm" onsubmit="submitCreate(event)" style="padding:24px;display:flex;flex-direction:column;gap:18px;flex:1;">
      <div>
        <label style="display:block;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#374151;margin-bottom:7px;">Title <span style="color:#E85D2F;">*</span></label>
        <input id="f-title" type="text" placeholder="What needs to be done?" required style="width:100%;padding:10px 12px;border:1px solid #E8E4DC;border-radius:8px;font-size:14px;color:#1A1A1A;background:white;transition:border-color 0.15s;box-sizing:border-box;">
      </div>
      <div>
        <label style="display:block;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#374151;margin-bottom:7px;">Description</label>
        <textarea id="f-desc" placeholder="Add more context..." rows="3" style="width:100%;padding:10px 12px;border:1px solid #E8E4DC;border-radius:8px;font-size:14px;color:#1A1A1A;background:white;resize:vertical;transition:border-color 0.15s;box-sizing:border-box;"></textarea>
      </div>
      <div style="display:flex;gap:12px;">
        <div style="flex:1;">
          <label style="display:block;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#374151;margin-bottom:7px;">Assignee</label>
          <input id="f-assignee" type="text" placeholder="Username" style="width:100%;padding:10px 12px;border:1px solid #E8E4DC;border-radius:8px;font-size:14px;color:#1A1A1A;background:white;transition:border-color 0.15s;box-sizing:border-box;">
        </div>
        <div style="flex:1;">
          <label style="display:block;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#374151;margin-bottom:7px;">Priority</label>
          <select id="f-priority" style="width:100%;padding:10px 12px;border:1px solid #E8E4DC;border-radius:8px;font-size:14px;color:#1A1A1A;background:white;cursor:pointer;transition:border-color 0.15s;box-sizing:border-box;appearance:none;">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <button type="submit" id="createBtn" style="padding:11px;border-radius:8px;border:none;background:#E85D2F;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:white;cursor:pointer;transition:background 0.15s;margin-top:4px;" onmouseover="this.style.background='#CF4E22'" onmouseout="this.style.background='#E85D2F'">
        Create Task
      </button>
    </form>
  </div>

  <!-- DETAIL PANEL -->
  <div id="detailPanel" class="slide-panel">
    <div id="detailContent" style="padding:24px;display:flex;flex-direction:column;gap:20px;flex:1;">
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast">
    <span id="toastIcon">✓</span>
    <span id="toastMsg"></span>
  </div>

<script>
  let API = 'http://localhost:9100';
  let tasks = [];
  let activePanel = null;

  // Demo credentials for the "Real Service" target (:8080), which enforces auth per
  // the security schemes in task-api.yaml. This is a lab/demo app, not a login flow —
  // the mock server (:9100) ignores these headers entirely.
  const DEMO_BASIC_AUTH = 'Basic ' + btoa('charlie:password456');
  const DEMO_BEARER_AUTH = 'Bearer tok_charlie_admin_8a4f';
  const DEMO_API_KEY = 'key_charlie_admin_7788';

  // ── API switcher ──────────────────────────────────────────────────────────────
  function setApi(url, optId) {
    API = url;
    ['opt-mock','opt-real'].forEach(id => {
      const el = document.getElementById(id);
      const dot = document.getElementById('dot-' + id.replace('opt-',''));
      el.classList.toggle('selected', id === optId);
      dot.style.background = id === optId ? '#E85D2F' : '#374151';
    });
    loadTasks();
  }

  // ── Toast ─────────────────────────────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '✕';
    document.getElementById('toastMsg').textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => { el.className = `toast ${type}`; }, 3000);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmtDate(iso) {
    try { return new Date(iso).toLocaleDateString('en-US', {month:'short', day:'numeric'}); }
    catch { return ''; }
  }

  function avatarColor(name) {
    const palette = ['#E85D2F','#3B82F6','#8B5CF6','#10B981','#F59E0B','#EF4444','#06B6D4','#84CC16'];
    if (!name) return '#94A3B8';
    let h = 0;
    for (const c of name) h = (h * 31 + c.charCodeAt(0)) | 0;
    return palette[Math.abs(h) % palette.length];
  }

  function initials(name) {
    return name ? name.slice(0,2).toUpperCase() : '?';
  }

  function priorityBadge(p) {
    const map = {
      high:   { bg:'#FEF2F2', color:'#DC2626', border:'#FECACA', label:'High' },
      medium: { bg:'#FFFBEB', color:'#D97706', border:'#FDE68A', label:'Med'  },
      low:    { bg:'#EFF6FF', color:'#2563EB', border:'#BFDBFE', label:'Low'  },
    };
    const s = map[p] || map.low;
    return `<span style="font-size:10px;font-weight:700;font-family:'Syne',sans-serif;padding:2px 7px;border-radius:6px;background:${s.bg};color:${s.color};border:1px solid ${s.border};">${s.label}</span>`;
  }

  function avatarEl(name, size = 28) {
    const fs = size < 30 ? 11 : 12;
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${avatarColor(name)};color:white;display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0;">${initials(name)}</div>`;
  }

  // ── Skeletons ─────────────────────────────────────────────────────────────────
  function renderSkeletons() {
    ['pending','in-progress','completed'].forEach(s => {
      document.getElementById(`col-${s}`).innerHTML = `
        <div class="skeleton" style="height:96px;"></div>
        <div class="skeleton" style="height:76px;opacity:0.65;"></div>
        <div class="skeleton" style="height:82px;opacity:0.4;"></div>
      `;
    });
  }

  // ── Render board ──────────────────────────────────────────────────────────────
  function renderBoard() {
    const cols = { pending: [], 'in-progress': [], completed: [] };
    tasks.forEach(t => cols[t.status]?.push(t));

    let total = 0;
    Object.entries(cols).forEach(([status, list]) => {
      total += list.length;
      document.getElementById(`cnt-${status}`).textContent = list.length;
      const col = document.getElementById(`col-${status}`);

      if (!list.length) {
        const emptyMap = {
          pending: { icon: '📋', msg: 'No pending tasks' },
          'in-progress': { icon: '⚙️', msg: 'Nothing in progress' },
          completed: { icon: '✅', msg: 'No completed tasks yet' },
        };
        const { icon, msg } = emptyMap[status];
        col.innerHTML = `<div style="text-align:center;padding:36px 16px;color:#C5C0B8;">
          <div style="font-size:28px;margin-bottom:8px;">${icon}</div>
          <div style="font-size:12px;font-weight:500;">${msg}</div>
        </div>`;
        return;
      }

      col.innerHTML = list.map((t, i) => `
        <div class="task-card fade-up" style="animation-delay:${i * 40}ms;" onclick="openDetail(${t.id})">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;">
            <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:#1A1A1A;line-height:1.4;flex:1;">${esc(t.title)}</span>
            ${priorityBadge(t.priority)}
          </div>
          ${t.description ? `<p style="font-size:12px;color:#9CA3AF;margin-bottom:10px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${esc(t.description)}</p>` : ''}
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:${t.description ? 2 : 8}px;">
            <div style="display:flex;align-items:center;gap:6px;">
              ${t.assignee
                ? `${avatarEl(t.assignee)}<span style="font-size:11px;color:#9CA3AF;font-weight:500;">${esc(t.assignee)}</span>`
                : '<span style="font-size:11px;color:#C5C0B8;">Unassigned</span>'}
            </div>
            <span style="font-family:'DM Mono',monospace;font-size:10px;color:#C5C0B8;">${fmtDate(t.createdAt)}</span>
          </div>
        </div>
      `).join('');
    });

    document.getElementById('totalPill').textContent = `${total} task${total !== 1 ? 's' : ''}`;
  }

  // ── Load tasks ────────────────────────────────────────────────────────────────
  async function loadTasks() {
    renderSkeletons();
    try {
      const res = await fetch(`${API}/tasks`, { headers: { 'Authorization': DEMO_BASIC_AUTH } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      tasks = await res.json();
      renderBoard();
    } catch (e) {
      ['pending','in-progress','completed'].forEach(s => {
        document.getElementById(`col-${s}`).innerHTML = `
          <div style="text-align:center;padding:28px;color:#EF4444;font-size:12px;">
            <div style="font-size:24px;margin-bottom:8px;">⚠️</div>
            <div style="font-weight:600;margin-bottom:4px;">Connection failed</div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:#9CA3AF;">${API}</div>
          </div>`;
      });
      toast(`Could not connect to ${API}`, 'error');
    }
  }

  // ── Health check ──────────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      const data = await res.json();
      toast(`Health: ${data.status} — ${API}`);
    } catch {
      toast(`Health check failed — ${API}`, 'error');
    }
  }

  // ── Panel helpers ─────────────────────────────────────────────────────────────
  function showPanel(id) {
    closePanel(false);
    activePanel = id;
    document.getElementById('overlay').classList.add('show');
    document.getElementById(id).classList.add('open');
  }

  function closePanel(clear = true) {
    if (activePanel) {
      document.getElementById(activePanel).classList.remove('open');
      if (clear) activePanel = null;
    }
    document.getElementById('overlay').classList.remove('show');
  }

  // ── Create panel ──────────────────────────────────────────────────────────────
  function openCreate() {
    document.getElementById('createForm').reset();
    showPanel('createPanel');
  }

  async function submitCreate(e) {
    e.preventDefault();
    const btn = document.getElementById('createBtn');
    btn.textContent = 'Creating…'; btn.disabled = true;
    try {
      const res = await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: {'Content-Type':'application/json', 'Authorization': DEMO_BEARER_AUTH},
        body: JSON.stringify({
          title:    document.getElementById('f-title').value.trim(),
          description: document.getElementById('f-desc').value.trim(),
          assignee: document.getElementById('f-assignee').value.trim(),
          priority: document.getElementById('f-priority').value,
        }),
      });
      if (!res.ok) throw new Error(await res.text());
      tasks.push(await res.json());
      renderBoard();
      closePanel();
      toast('Task created');
    } catch {
      toast('Failed to create task', 'error');
    } finally {
      btn.textContent = 'Create Task'; btn.disabled = false;
    }
  }

  // ── Detail panel ──────────────────────────────────────────────────────────────
  function openDetail(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;

    const next = { pending: 'in-progress', 'in-progress': 'completed', completed: null }[t.status];
    const prev = { pending: null, 'in-progress': 'pending', completed: 'in-progress' }[t.status];
    const labels = { pending: 'Pending', 'in-progress': 'In Progress', completed: 'Completed' };
    const sColors = { pending: '#94A3B8', 'in-progress': '#F59E0B', completed: '#22C55E' };
    const sc = sColors[t.status];

    document.getElementById('detailContent').innerHTML = `
      <!-- header -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid #E8E4DC;">
        <div style="flex:1;padding-right:14px;">
          <h2 style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#1A1A1A;line-height:1.35;margin-bottom:10px;">${esc(t.title)}</h2>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:${sc}22;color:${sc};border:1px solid ${sc}44;">${labels[t.status]}</span>
            ${priorityBadge(t.priority)}
          </div>
        </div>
        <button onclick="closePanel()" style="width:28px;height:28px;border-radius:7px;border:1px solid #E8E4DC;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;" onmouseover="this.style.background='#F0EFE9'" onmouseout="this.style.background='white'">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 1l9 9M10 1L1 10" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      ${t.description ? `
      <div>
        <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:8px;">Description</div>
        <p style="font-size:14px;color:#374151;line-height:1.65;">${esc(t.description)}</p>
      </div>` : ''}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:8px;">Assignee</div>
          ${t.assignee
            ? `<div style="display:flex;align-items:center;gap:8px;">${avatarEl(t.assignee, 32)}<span style="font-size:13px;font-weight:500;color:#1A1A1A;">${esc(t.assignee)}</span></div>`
            : '<span style="font-size:13px;color:#C5C0B8;">Unassigned</span>'}
        </div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:8px;">Task ID</div>
          <span style="font-family:'DM Mono',monospace;font-size:13px;color:#374151;">#${t.id}</span>
        </div>
      </div>

      <!-- actions -->
      <div style="margin-top:auto;padding-top:16px;border-top:1px solid #E8E4DC;">
        <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:10px;">Move Task</div>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          ${prev ? `<button onclick="moveTask(${t.id},'${prev}')" style="flex:1;padding:9px;border-radius:8px;border:1px solid #E8E4DC;background:white;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:#374151;cursor:pointer;" onmouseover="this.style.background='#F5F3EE'" onmouseout="this.style.background='white'">← ${labels[prev]}</button>` : ''}
          ${next ? `<button onclick="moveTask(${t.id},'${next}')" style="flex:1;padding:9px;border-radius:8px;border:none;background:#E85D2F;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:white;cursor:pointer;" onmouseover="this.style.background='#CF4E22'" onmouseout="this.style.background='#E85D2F'">${labels[next]} →</button>` : ''}
          ${!prev && !next ? '<span style="font-size:12px;color:#9CA3AF;">No further moves</span>' : ''}
        </div>
        <button onclick="deleteTask(${t.id})" style="width:100%;padding:9px;border-radius:8px;border:1px solid #FECACA;background:#FEF2F2;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:#DC2626;cursor:pointer;" onmouseover="this.style.background='#FEE2E2'" onmouseout="this.style.background='#FEF2F2'">
          Delete Task
        </button>
      </div>
    `;
    showPanel('detailPanel');
  }

  // ── Mutations ─────────────────────────────────────────────────────────────────
  async function moveTask(id, newStatus) {
    const task = tasks.find(t => t.id === id);
    try {
      const res = await fetch(`${API}/tasks/${id}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json', 'Authorization': DEMO_BEARER_AUTH},
        body: JSON.stringify({ status: newStatus, assignee: task?.assignee || '' }),
      });
      if (!res.ok) throw new Error();
      const updated = await res.json();
      tasks = tasks.map(t => t.id === id ? updated : t);
      renderBoard();
      closePanel();
      toast(`Moved to ${newStatus.replace('-',' ')}`);
    } catch {
      toast('Failed to update task', 'error');
    }
  }

  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    try {
      const res = await fetch(`${API}/tasks/${id}`, { method: 'DELETE', headers: { 'X-API-Key': DEMO_API_KEY } });
      if (res.status !== 204 && !res.ok) throw new Error();
      tasks = tasks.filter(t => t.id !== id);
      renderBoard();
      closePanel();
      toast('Task deleted');
    } catch {
      toast('Failed to delete task', 'error');
    }
  }

  // Init
  loadTasks();
</script>
</body>
</html>
