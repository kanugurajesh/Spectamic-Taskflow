openapi: 3.0.1
info:
  title: Task Management API
  description: Contract for the Task Management Service — an executable spec that guides both humans and AI coding agents
  version: '1.0'

paths:
  /tasks:
    get:
      summary: List all tasks
      security:
        - basicAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, in-progress, completed]
          examples:
            TASKS_200_OK:
              value: in-progress
            LIST_TASKS_400:
              value: archived
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
              examples:
                TASKS_200_OK:
                  value:
                    - id: 1
                      title: "Implement Login Feature"
                      description: "Create JWT-based authentication"
                      status: "in-progress"
                      assignee: "alice"
                      priority: "high"
                      createdAt: "2024-01-15T10:00:00Z"
        '400':
          description: Validation error — invalid status filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                LIST_TASKS_400:
                  value:
                    error: "Validation failed"
                    message: "status must be one of ['completed', 'in-progress', 'pending']"
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new task
      security:
        - oAuth2AuthCode: [tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Validation error — required fields missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Valid credentials, but role not permitted to create tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{taskId}:
    get:
      summary: Get a task by ID
      security:
        - basicAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
          examples:
            GET_TASK_200:
              value: 1
            GET_TASK_404:
              value: 999
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              examples:
                GET_TASK_200:
                  value:
                    id: 1
                    title: "Implement Login Feature"
                    description: "Create JWT-based authentication"
                    status: "in-progress"
                    assignee: "alice"
                    priority: "high"
                    createdAt: "2024-01-15T10:00:00Z"
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                GET_TASK_404:
                  value:
                    error: "Not Found"
                    message: "Task with id 999 not found"
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update a task
      security:
        - oAuth2AuthCode: [tasks]
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Validation error — invalid field value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Valid credentials, but role not permitted to update tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a task
      security:
        - apiKeyAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
          examples:
            DELETE_TASK_204:
              value: 3
            DELETE_TASK_404:
              value: 999
      responses:
        '204':
          description: Task deleted successfully
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                DELETE_TASK_404:
                  value:
                    error: "Not Found"
                    message: "Task with id 999 not found"
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Valid credentials, but role not permitted to delete tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Task:
      type: object
      required:
        - id
        - title
        - status
        - priority
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in-progress, completed]
        assignee:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        createdAt:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      required:
        - title
        - priority
      properties:
        title:
          type: string
        description:
          type: string
        assignee:
          type: string
        priority:
          type: string
          enum: [low, medium, high]

    UpdateTaskRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, in-progress, completed]
        assignee:
          type: string
        priority:
          type: string
          enum: [low, medium, high]

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication — required to read tasks (any valid account)
    oAuth2AuthCode:
      type: oauth2
      description: Keycloak-backed OAuth2 — required to create or update tasks (developer, manager, or admin role)
      flows:
        authorizationCode:
          authorizationUrl: http://localhost:8083/realms/taskflow/protocol/openid-connect/auth
          tokenUrl: http://localhost:8083/realms/taskflow/protocol/openid-connect/token
          scopes:
            tasks: create and update tasks
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication — required to delete tasks (admin role only)
